# HD-Search — SELF-HOSTED, fully standalone stack (open-source mode).
#
# Unlike docker-compose.yml (which reuses shared `hdnet` infra provisioned by the
# parent monorepo's start_core_infra.sh), this file BUNDLES every backend the app
# uses so an outside user can run the whole thing with nothing pre-installed:
#
#   • hds-db          TimescaleDB/Postgres  (users, encrypted provider keys, history, metrics)
#   • hds-redis       Redis Stack + RediSearch (cache, rate-limit, vector HNSW index)
#   • hds-seaweedfs   SeaweedFS S3          (raw crawl payloads, file-upload originals)
#   • hds-embeddings  transformers-inference MiniLM-L6 (384-dim vectors for vector search / RAG)
#   • hds-openserp    self-hosted multi-engine SERP scraper
#   • hds-searxng     self-hosted meta-search over 50+ engines
#   • hds-crawl4ai    self-hosted LLM crawler
#   • hds-browserless headless Chrome for JS-rendered crawls
#   • hds-tor         Tor SOCKS proxy for .onion darkweb providers
#   • hds-api / hds-web   the aggregator API + Next.js UI
#
# Everything runs on its OWN `hdsnet` network with `hds-*` names, so it will NOT
# collide with the shared hd-redis / hd-db / hd-seaweedfs you may already run.
# The datastores are internal-only (no published host ports) for the same reason.
#
# QUICKSTART (nothing else installed required):
#   docker compose -f docker-compose.selfhost.yml up -d --build
#   open http://localhost:3000   (first run → create your admin account)
#
# No secrets to configure — the app auto-generates its crypto secrets into the
# shared `hds-secrets` volume. Copy .env.selfhost.example only to change non-secret
# defaults (ports/URLs/flags). Add provider API keys in the UI (Account → Provider
# Keys). To run the PUBLISHED images instead of building, use docker-compose.hub.yml.
#
# SaaS is OFF: no Auth0, no Stripe/plans/credits, no external services. Auth is
# local email + password.

services:
  # ==========================================================================
  # Datastores (internal-only — no host ports, isolated from your shared infra)
  # ==========================================================================
  hds-db:
    image: timescale/timescaledb:latest-pg17
    container_name: hds-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hdsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hdsearch}
      POSTGRES_DB: ${POSTGRES_DB:-hdsearch}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      PGDATA: /var/lib/postgresql/data/pg_data
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - hds-postgres-data:/var/lib/postgresql/data
    networks: [hdsnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hdsearch} -d ${POSTGRES_DB:-hdsearch}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  hds-redis:
    image: redis/redis-stack-server:latest   # Redis + RediSearch (HNSW ANN for vector search)
    container_name: hds-redis
    restart: unless-stopped
    environment:
      - REDIS_ARGS=--appendonly yes
    volumes:
      - hds-redis-data:/data
    networks: [hdsnet]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hds-seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: hds-seaweedfs
    restart: unless-stopped
    command: ["server", "-s3"]
    environment:
      AWS_ACCESS_KEY_ID: ${STORAGE_AWS_ACCESS_KEY_ID:-hdsearch}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_AWS_SECRET_ACCESS_KEY:-hdsearch-secret}
    volumes:
      - hds-seaweedfs-data:/data
    networks: [hdsnet]

  hds-embeddings:
    # Weaviate transformers-inference — serves POST /vectors; MiniLM-L6 → 384-dim
    # (matches HDSEARCH_VECTOR_DIM=384). No native arm64 build → runs under
    # emulation on Apple Silicon (works, just slower on first cold call).
    image: semitechnologies/transformers-inference:sentence-transformers-multi-qa-MiniLM-L6-cos-v1
    container_name: hds-embeddings
    restart: unless-stopped
    environment:
      ENABLE_CUDA: ${WEAVIATE_ENABLE_CUDA:-0}
    networks: [hdsnet]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/.well-known/ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # Search / crawl providers
  # ==========================================================================
  hds-openserp:
    image: karust/openserp:latest
    container_name: hds-openserp
    restart: unless-stopped
    platform: linux/amd64   # no native arm64 image; runs under emulation
    command: ["serve", "-a", "0.0.0.0", "-p", "7000",
              "--allow_endpoint_fallback", "--timeout", "20",
              "--max_retries", "2", "--cache_ttl", "600", "--cache_max_size", "2000",
              "--cb_failures", "3", "--cb_recovery", "120", "-l"]
    networks: [hdsnet]

  hds-searxng:
    image: searxng/searxng:latest
    container_name: hds-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SEARCH_FORMATS=html,json
    volumes:
      - ./searxng:/etc/searxng:rw
    networks: [hdsnet]

  hds-crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: hds-crawl4ai
    restart: unless-stopped
    environment:
      - CRAWL4AI_LOG_LEVEL=${CRAWL4AI_LOG_LEVEL:-INFO}
    networks: [hdsnet]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hds-browserless:
    image: browserless/chrome:latest
    container_name: hds-browserless
    restart: unless-stopped
    environment:
      - CONNECTION_TIMEOUT=60000
      - MAX_CONCURRENT_SESSIONS=10
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
    shm_size: 2gb
    networks: [hdsnet]

  hds-tor:
    image: dperson/torproxy:latest
    container_name: hds-tor
    restart: unless-stopped
    environment:
      - TOR_NewCircuitPeriod=600
      - TOR_MaxCircuitDirtiness=600
    networks: [hdsnet]

  # ==========================================================================
  # One-shot schema migration (runs, applies db/schema.sql, then exits)
  # ==========================================================================
  hds-migrate:
    build: ./api
    image: hdsearch:api
    container_name: hds-migrate
    command: ["node", "dist/scripts/migrate.js"]
    environment:
      - HDSEARCH_DATABASE_URL=postgres://${POSTGRES_USER:-hdsearch}:${POSTGRES_PASSWORD:-hdsearch}@hds-db:5432/${POSTGRES_DB:-hdsearch}
    depends_on:
      hds-db:
        condition: service_healthy
    networks: [hdsnet]
    restart: "no"

  # ==========================================================================
  # Application — aggregator API + Next.js UI
  # ==========================================================================
  hds-api:
    build: ./api
    image: hdsearch:api
    container_name: hds-api
    restart: unless-stopped
    environment:
      # --- datastores (bundled above) ---
      - HDSEARCH_DATABASE_URL=postgres://${POSTGRES_USER:-hdsearch}:${POSTGRES_PASSWORD:-hdsearch}@hds-db:5432/${POSTGRES_DB:-hdsearch}
      - HDSEARCH_REDIS_URL=redis://hds-redis:6379/5
      - HDSEARCH_S3_ENDPOINT=http://hds-seaweedfs:8333
      - STORAGE_AWS_ACCESS_KEY_ID=${STORAGE_AWS_ACCESS_KEY_ID:-hdsearch}
      - STORAGE_AWS_SECRET_ACCESS_KEY=${STORAGE_AWS_SECRET_ACCESS_KEY:-hdsearch-secret}
      - STORAGE_AWS_REGION=us-east-1
      - HDSEARCH_BUCKET=hd-search
      # --- embeddings / vector search ---
      - HDSEARCH_EMBEDDINGS_PROVIDER=minilm
      - HDSEARCH_EMBEDDINGS_URL=http://hds-embeddings:8080
      - HDSEARCH_VECTOR_DIM=384
      # --- AI Mode: local LLMs via Ollama on the host (no key, $0). Models are
      # discovered from whatever you've pulled. host.docker.internal reaches the
      # host from the container (extra_hosts below covers Linux too). ---
      - HDSEARCH_OLLAMA_URL=${HDSEARCH_OLLAMA_URL:-http://host.docker.internal:11434}
      # --- providers ---
      - HDSEARCH_OPENSERP_URL=http://hds-openserp:7000
      - HDSEARCH_OPENSERP_ENGINES=${HDSEARCH_OPENSERP_ENGINES:-google,yandex,bing,baidu}
      - HDSEARCH_SEARXNG_URL=http://hds-searxng:8080
      - HDSEARCH_CRAWL4AI_URL=http://hds-crawl4ai:11235
      - HDSEARCH_BROWSERLESS_URL=http://hds-browserless:3000
      - HDSEARCH_TOR_PROXY=socks5h://hds-tor:9050
      # Maps geocoder: empty → public Photon (works out of the box). Self-host via
      # the `maps` profile (hds-photon) and set HDSEARCH_GEOCODER_URL=http://hds-photon:2322
      - HDSEARCH_GEOCODER_ENGINE=photon
      - HDSEARCH_GEOCODER_URL=${HDSEARCH_GEOCODER_URL:-}
      # --- secrets: NONE in env. The encryption / internal / session secrets are
      # auto-generated on first boot and persisted to the shared `hds-secrets`
      # volume (mounted below), so api & web agree automatically and the values
      # survive restarts. Provider API keys are NOT set here — enter them in the UI
      # (Account -> Provider Keys, or Admin -> Default Keys for system-wide keys).
      - HDSEARCH_SECRETS_FILE=/secrets/hdsearch-secrets.json
      - HDSEARCH_API_PORT=8791
      # --- SaaS OFF: local/open-source mode ---
      - HDSEARCH_AUTH_MODE=legacy
      # --- local auth (Phase 2) ---
      # Optional headless admin bootstrap: set both to auto-create the admin on first
      # run (otherwise the web UI shows a first-run "create admin account" screen).
      - HDSEARCH_ADMIN_EMAIL=${HDSEARCH_ADMIN_EMAIL:-}
      - HDSEARCH_ADMIN_PASSWORD=${HDSEARCH_ADMIN_PASSWORD:-}
      # Set true to allow open self-service signup (default: only the first-run admin,
      # then registration is closed).
      - HDSEARCH_OPEN_SIGNUP=${HDSEARCH_OPEN_SIGNUP:-false}
    ports:
      - "${API_PORT:-8791}:8791"
    volumes:
      - hds-secrets:/secrets
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach a host-run Ollama from the container
    depends_on:
      hds-db:
        condition: service_healthy
      hds-redis:
        condition: service_healthy
      hds-migrate:
        condition: service_completed_successfully
    networks: [hdsnet]

  hds-web:
    build: ./web
    image: hdsearch:web
    container_name: hds-web
    restart: unless-stopped
    environment:
      - HDSEARCH_API_URL=http://hds-api:8791
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8791}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      # Shares the API's auto-generated internal + session secrets via /secrets.
      - HDSEARCH_SECRETS_FILE=/secrets/hdsearch-secrets.json
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - hds-secrets:/secrets
    depends_on:
      # wait until the API is healthy so the shared secrets file already exists
      hds-api:
        condition: service_healthy
    networks: [hdsnet]

  # ==========================================================================
  # MCP server (Streamable HTTP) — connect any MCP client to http://localhost:8792/mcp
  # with Authorization: Bearer sk-hds-<your key>. Uses the same api image.
  # ==========================================================================
  hds-mcp:
    build: ./api
    image: hdsearch:api
    container_name: hds-mcp
    restart: unless-stopped
    command: ["node", "dist/mcp/server.js", "--http"]
    environment:
      - HDSEARCH_API_URL=http://hds-api:8791
      - MCP_PORT=8792
    ports:
      - "${MCP_PORT:-8792}:8792"
    # Override the api image's healthcheck (it probes :8791) — MCP serves on :8792.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8792/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      hds-api:
        condition: service_healthy
    networks: [hdsnet]

  # ---- OPT-IN self-hosted OpenStreetMap geocoder (the `maps` modality) ----
  # `docker compose --env-file .env.selfhost -f docker-compose.selfhost.yml --profile maps up -d hds-photon`
  # then set HDSEARCH_GEOCODER_URL=http://hds-photon:2322. Without it the API uses
  # the public Photon instance (no setup). First run downloads a large OSM index.
  hds-photon:
    image: rtuszik/photon-docker:latest
    container_name: hds-photon
    profiles: [maps]
    restart: unless-stopped
    environment:
      - REGION=${HDSEARCH_PHOTON_REGION:-monaco}
      - UPDATE_STRATEGY=PARALLEL
      - UPDATE_INTERVAL=720h
    volumes:
      - hds-photon-data:/photon/data
    networks: [hdsnet]

volumes:
  hds-secrets:          # auto-generated crypto secrets, shared by api + web
  hds-postgres-data:
  hds-redis-data:
  hds-seaweedfs-data:
  hds-photon-data:

networks:
  hdsnet:
    name: hdsnet
